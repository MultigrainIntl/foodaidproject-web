name: Service Corps copy cleanup

on:
  push:
    branches:
      - service-corps-copy-cleanup
    paths:
      - .github/workflows/service-corps-copy-cleanup.yml

permissions:
  contents: write

jobs:
  update-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service-corps-copy-cleanup
          fetch-depth: 0
      - name: Apply approved copy corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('service-corps.html')
          text = path.read_text(encoding='utf-8')

          old_checkbox = 'Agriculture, food systems, farming, sourcing, or commodity markets'
          new_checkbox = 'Agriculture, food systems, sourcing, or commodity markets'
          old_placeholder = 'Examples: food processors, farmers, freight companies, foundations, civic groups, attorneys, technology leaders, online communities, professional associations, or consumer audiences.'
          new_placeholder = 'Examples: food processors, agricultural businesses and commodity organizations, freight companies, foundations, civic groups, attorneys, technology leaders, online communities, professional associations, or consumer audiences.'

          if text.count(old_checkbox) != 2:
              raise SystemExit(f'Expected checkbox phrase twice, found {text.count(old_checkbox)}')
          if text.count(old_placeholder) != 1:
              raise SystemExit(f'Expected placeholder phrase once, found {text.count(old_placeholder)}')

          text = text.replace(old_checkbox, new_checkbox)
          text = text.replace(old_placeholder, new_placeholder)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate site
        run: python scripts/validate-site.py
      - name: Commit approved copy cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add service-corps.html
          git commit -m "Remove farming language from Service Corps form"
          git push origin HEAD:service-corps-copy-cleanup
