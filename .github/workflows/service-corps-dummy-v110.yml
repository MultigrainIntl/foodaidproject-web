name: One-time Service Corps v1.1.0 dummy submission

on:
  push:
    branches:
      - service-corps-endpoint-v1
    paths:
      - .github/workflows/service-corps-dummy-v110.yml

permissions:
  contents: read

jobs:
  submit-dummy-intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service-corps-endpoint-v1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/run-service-corps-dummy-v110.js
