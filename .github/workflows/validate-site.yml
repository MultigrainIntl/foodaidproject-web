name: Validate static site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate HTML and inline JavaScript
        run: python scripts/validate-site.py

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.53.2
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          python -m http.server 8000 --bind 127.0.0.1 > /tmp/foodaid-site.log 2>&1 &
          echo $! > /tmp/foodaid-site.pid
          sleep 2

      - name: Run rendered browser verification
        run: node scripts/browser-check.mjs

      - name: Upload rendered proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-corps-rendered-proof
          path: artifacts/site-proof
          if-no-files-found: warn
