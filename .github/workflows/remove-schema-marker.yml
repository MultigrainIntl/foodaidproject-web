name: Remove temporary schema marker

on:
  push:
    branches:
      - service-corps-endpoint-v1
    paths:
      - .github/workflows/remove-schema-marker.yml

permissions:
  contents: write

jobs:
  remove-marker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: service-corps-endpoint-v1
          fetch-depth: 0
      - run: |
          rm -f schema-repair-check.txt
          rm -f .github/workflows/remove-schema-marker.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary schema validation marker"
          git push origin HEAD:service-corps-endpoint-v1
