name: Review Preview

on:
  push:
    branches:
      - fap-website-v2-candidate
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-review-preview
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Prepare isolated preview
        run: |
          mkdir _preview
          rsync -a --exclude='.git' --exclude='.github' --exclude='CNAME' --exclude='node_modules' --exclude='artifacts' ./ _preview/
          touch _preview/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload isolated preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: _preview

      - name: Deploy review preview
        id: deployment
        uses: actions/deploy-pages@v4
