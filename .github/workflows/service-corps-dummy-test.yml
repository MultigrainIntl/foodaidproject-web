name: One-time Service Corps dummy submission

on:
  push:
    branches:
      - service-corps-endpoint-v1
    paths:
      - .github/workflows/service-corps-dummy-test.yml

permissions:
  contents: read

jobs:
  submit-dummy-intake:
    runs-on: ubuntu-latest
    steps:
      - name: Submit one controlled dummy questionnaire
        env:
          ENDPOINT: https://script.google.com/macros/s/AKfycbzVIx_2Qc0w9f4ch7b3uo-n8Krs86r4_DAAT8CPhwkfCGpsA3WryOApucfUp9n9eqou/exec
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error --location --max-time 90 "$ENDPOINT" \
            --data-urlencode 'fullName=SERVICE CORPS TEST — DELETE' \
            --data-urlencode 'email=info@foodaidproject.org' \
            --data-urlencode 'phone=TEST ONLY' \
            --data-urlencode 'contactMethod=Email' \
            --data-urlencode 'city=TEST CITY' \
            --data-urlencode 'region=TEST REGION' \
            --data-urlencode 'country=United States' \
            --data-urlencode 'adultStatus=Yes' \
            --data-urlencode 'participation=General volunteer' \
            --data-urlencode 'skillsSummary=TEST ONLY — writing, outreach, and food-security communications' \
            --data-urlencode 'loveToDo=TEST ONLY — help Food Aid Project explain its mission and connect with supporters' \
            --data-urlencode 'skillArea=Writing and editing' \
            --data-urlencode 'skillArea=Social media and digital outreach' \
            --data-urlencode 'skillArea=Food systems and agriculture' \
            --data-urlencode 'relationships=TEST ONLY — This is a controlled systems test and is not a real volunteer application or service request.' \
            --data-urlencode 'meaningful=TEST ONLY — verify intake routing, spreadsheet records, JoieOS queueing, and email notifications.' \
            --data-urlencode 'serviceFormat=Remote' \
            --data-urlencode 'weeklyHours=1–5 hours' \
            --data-urlencode 'startTime=Immediately' \
            --data-urlencode 'schedule=TEST ONLY — flexible' \
            --data-urlencode 'travel=No' \
            --data-urlencode 'heardAbout=Controlled system test' \
            --data-urlencode 'referrer=ChatGPT controlled verification' \
            --data-urlencode 'consentContact=Yes' \
            --data-urlencode 'acknowledgeStatus=Yes' \
            --data-urlencode 'acknowledgeSensitive=Yes' \
            --data-urlencode 'updates=No' \
            --data-urlencode 'sourceOrigin=https://www.foodaidproject.org/service-corps.html')"
          printf '%s\n' "$response"
          grep -Fq 'Your questionnaire has been received.' <<< "$response"
