name: Apply Service Corps schema repair

on:
  push:
    branches:
      - service-corps-endpoint-v1
    paths:
      - scripts/apply-service-corps-schema-repair.py
      - .github/workflows/apply-service-corps-schema-repair.yml

permissions:
  contents: write

jobs:
  apply-repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: service-corps-endpoint-v1
          fetch-depth: 0

      - name: Apply schema repair
        run: python scripts/apply-service-corps-schema-repair.py

      - name: Validate repaired source
        run: python scripts/validate-site.py

      - name: Remove one-time repair tooling
        run: |
          rm scripts/apply-service-corps-schema-repair.py
          rm .github/workflows/apply-service-corps-schema-repair.yml

      - name: Commit repaired source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair Service Corps intake schema mapping"
          git push origin HEAD:service-corps-endpoint-v1
